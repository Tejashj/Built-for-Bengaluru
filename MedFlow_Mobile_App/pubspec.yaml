name: skit_bfb
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  supabase_flutter: ^2.12.0
  image_picker: ^1.2.1
  camera: ^0.12.0
  flutter_tts: ^4.2.5
  google_mlkit_text_recognition: ^0.15.1
  google_fonts: ^8.0.2
  http: ^1.6.0
  web3dart: ^2.7.3
  geolocator: ^14.0.2
  google_maps_flutter: ^2.15.0
  flutter_dotenv: ^6.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  lottie: ^3.3.2
  speech_to_text: ^7.3.0
  animate_do: ^4.2.0
  flutter_launcher_icons: ^0.13.1
  avatar_glow: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/medflow_app_logo.png
    
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/medflow_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#0xFF000000" # Matches your app's primary teal